snapshots:
  - name: dim_hosts
    relation: ref('hosts')
    config:
      schema: gold
      database: AIRBNB
      unique_key: HOST_ID
      strategy: check
      check_cols:
        - HOST_NAME
        - HOST_TYPE
        - RESPONSE_RATE
        - HOST_EXPERIENCE_YEARS
      updated_at: HOST_CREATED_AT
      dbt_valid_to_current: "to_date('9999-12-31')"