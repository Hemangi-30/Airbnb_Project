snapshots:
    - name: dim_listings
      relation: ref('listings') # Reference to the ephemeral model (listings)
      config:
        schema: gold
        database: AIRBNB
        unique_key: LISTING_ID
        strategy: check

        check_cols:
          - PRICE_PER_NIGHT
          - PRICE_CATEGORY
          - PROPERTY_SIZE
          - GUEST_CAPACITY_CATEGORY
        updated_at: LISTINGS_CREATED_AT
        dbt_valid_to_current: "to_date('9999-12-31')"