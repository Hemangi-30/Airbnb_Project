snapshots:
    - name: dim_bookings
      relation: ref('bookings')
      config:
        schema: gold
        database: AIRBNB
        unique_key: BOOKING_ID   # apply SCD-2 ON this columns 
        strategy: check

        check_cols:
          - BOOKING_STATUS
          - TOTAL_REVENUE
          - NIGHTS_BOOKED
        updated_at: BOOKING_CREATED_AT
        dbt_valid_to_current: "to_date('9999-12-31')"